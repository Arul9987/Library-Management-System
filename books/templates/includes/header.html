<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <!-- Logo -->
      <a class="navbar-brand fw-bold fs-4" href="{% url 'home' %}">Bookify</a>

      <!-- Toggle button for mobile -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"><span class="navbar-toggler-icon"></span></button>

      <!-- Menu items -->
      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <!-- Home -->
          <li class="nav-item">
            <a class="nav-link nav-btn {% if request.resolver_match.url_name == 'home' %}active-menu{% endif %}" href="{% url 'home' %}">Home</a>
          </li>

          <!-- About/Feature -->
          <li class="nav-item">
            <a class="nav-link nav-btn {% if request.resolver_match.url_name == 'features' %}active-menu{% endif %}" href="{% url 'features' %}">Features</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-btn {% if request.resolver_match.url_name == 'about' %}active-menu{% endif %}" href="{% url 'about' %}">About</a>
          </li>
          {% if user.is_authenticated %}
            <!-- logout -->
            <li class="nav-item">
              <a class="nav-link nav-btn" href="{% url 'dashboard' %}">Dashboard</a>
            </li>
          {% else %}
            <!-- Register/Login -->
            <li class="nav-item">
              <a class="nav-link nav-btn {% if request.resolver_match.url_name == 'register' %}active-menu{% endif %}" href="{% url 'register' %}">Register</a>
            </li>
            <li class="nav-item">
              <a class="nav-link nav-btn {% if request.resolver_match.url_name == 'login' %}active-menu{% endif %}" href="{% url 'login' %}">Login</a>
            </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>
</header>
<style>
  .navbar {
    background: linear-gradient(90deg, #24c1f1, #7c3aed);
  }
</style>

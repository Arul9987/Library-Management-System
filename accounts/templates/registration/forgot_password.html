{% extends 'base.html' %}

{% block content %}
  <div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-lg-4 col-md-6 col-sm-10">
      <div class="card border-0 shadow-lg rounded-5">
        <!-- Header -->
        <div class="card-header text-center text-white rounded-top-5 py-3 back "  >
          <h4 class="mb-0 fw-bold"><i class="bi bi-shield-lock me-2"></i>Reset Password</h4>
        </div>

        <!-- Body -->
        <div class="card-body p-4">
          <form method="POST">
            {% csrf_token %}

            <!-- Email -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Email Address</label>
              <div class="input-group">
                <span class="input-group-text rounded-start-pill"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control rounded-end-pill" placeholder="Enter your email" required />
              </div>
            </div>

            <!-- New Password -->
            <div class="mb-3">
              <label class="form-label fw-semibold">New Password</label>
              <div class="input-group">
                <span class="input-group-text rounded-start-pill"><i class="bi bi-lock"></i></span>
                <input type="password" name="new_password" class="form-control rounded-end-pill" placeholder="Enter new password" required />
              </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-4">
              <label class="form-label fw-semibold">Confirm Password</label>
              <div class="input-group">
                <span class="input-group-text rounded-start-pill"><i class="bi bi-lock-fill"></i></span>
                <input type="password" name="confirm_password" class="form-control rounded-end-pill" placeholder="Confirm password" required />
              </div>
            </div>

            <!-- Button -->
            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm"><i class="bi bi-arrow-repeat me-2"></i>Reset Password</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <style>
    .back {
      background: linear-gradient(90deg, #24c1f1, #7c3aed);
    }
  </style>
{% endblock %}
